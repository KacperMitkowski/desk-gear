name: "🐛 Bug Report"
description: "[bug] Zgłoś błąd w działaniu systemu"
labels: ["type:bug"]
body:
  - type: markdown
    attributes:
      value: |
        Zgłoś błąd w działaniu systemu.

        > [!TIP]
        > Im więcej kontekstu (kroki reprodukcji, screen, console log), tym szybciej naprawimy.

  - type: textarea
    id: description
    attributes:
      label: 🐞 Opis błędu
      description: Krótko opisz co się dzieje i czego oczekiwałeś.
      placeholder: |
        Po kliknięciu "Dodaj do koszyka" na PDP, koszyk się nie aktualizuje — badge w headerze pokazuje stary stan.
        Oczekiwane: badge powinien się natychmiast zwiększyć o 1.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 🔬 Kroki reprodukcji
      description: Lista kroków, które prowadzą do błędu. Im bardziej minimalna, tym lepiej.
      placeholder: |
        1. Otwórz `/shop`
        2. Kliknij dowolny produkt → przejdź do PDP
        3. Wybierz wariant
        4. Kliknij "Dodaj do koszyka"
        5. Zwróć uwagę na badge w headerze — nie zmienia się
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 🌐 Środowisko
      description: Gdzie wystąpił błąd? (prod / preview / lokalnie + przeglądarka, OS)
      placeholder: |
        - Środowisko: production (vercel.app)
        - Przeglądarka: Chrome 137 / Firefox 142 / Safari 18
        - OS: macOS Sonoma / Windows 11 / Ubuntu 24
        - Czy odtworzone w innej przeglądarce: tak/nie
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: 📋 Logi, screenshoty, console errors
      description: Wklej errory z konsoli przeglądarki, screen, link do nagrania.
      placeholder: |
        Console error:
        ```
        TypeError: Cannot read property 'itemCount' of undefined
            at Header.tsx:42
        ```

        Screen: [załącz]
    validations:
      required: false

  - type: textarea
    id: impact
    attributes:
      label: 💥 Wpływ na użytkowników
      description: Czy to blokuje główny flow? Ilu użytkowników dotyczy?
      placeholder: |
        - Blokuje zakup (krytyczne) / utrudnia (średnie) / drobna niedogodność (niskie)
        - Wszyscy użytkownicy / tylko zalogowani / tylko z konkretną przeglądarką
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        **ℹ️ Jak skutecznie zgłosić bug?**

        **Minimalne reprodukcyjne kroki** — usuń wszystko co nie jest potrzebne do wywołania błędu.
        **Console + Network tab** — to pierwsze miejsce gdzie szukamy źródła problemu.
        **Wpływ** — pomoże nam ocenić priorytet (krytyczne vs nice-to-have).
