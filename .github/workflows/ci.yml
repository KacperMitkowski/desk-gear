name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# CI env placeholders. `env.ts` walidacja przez @t3-oss/env-nextjs wymaga tych zmiennych
# żeby `next build` / `tsc` przeszło. DATABASE_URL jest realnie używany w jobach z DB;
# AUTH_SECRET / AUTH_URL są placeholderami (Auth.js stub jest w task #6).
env:
  AUTH_SECRET: ci-secret-min-32-chars-long-pad-pad
  AUTH_URL: http://localhost:3000

jobs:
  quality:
    name: Quality (typecheck + lint + format)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/deskgear_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check

  unit-integration:
    name: Unit + integration (with coverage)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: deskgear_test
        ports: [5432:5432]
        options: --health-cmd pg_isready --health-interval 10s
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/deskgear_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 14

  build:
    name: Build (next build)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/deskgear_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run build

  e2e:
    name: E2E (Playwright on production build)
    needs: [unit-integration, build]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: deskgear_test
        ports: [5432:5432]
        options: --health-cmd pg_isready --health-interval 10s
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/deskgear_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npx prisma db seed
      - run: npx playwright install --with-deps chromium
      # `npm run build` must precede `playwright test`: Playwright's webServer
      # starts `npm run start` in CI mode (see playwright.config.ts), which
      # requires `.next/` from a prior build.
      - run: npm run build
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
